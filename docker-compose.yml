services:
  nextjs:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ilge-nextjs
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://ilge:ilge_password@postgres:5432/ilge
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    expose:
      - "3000"

  postgres:
    image: postgis/postgis:16-3.4
    container_name: ilge-postgis
    environment:
      POSTGRES_DB: ilge
      POSTGRES_USER: ilge
      POSTGRES_PASSWORD: ilge_password
    volumes:
      - ilge-postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ilge -d ilge"]
      interval: 10s
      timeout: 5s
      retries: 8

  minio:
    image: minio/minio:latest
    container_name: ilge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ilge
      MINIO_ROOT_PASSWORD: ilge_password
    volumes:
      - ilge-minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  redis:
    image: redis:7-alpine
    container_name: ilge-redis
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    container_name: ilge-nginx
    depends_on:
      - nextjs
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

volumes:
  ilge-postgres-data:
  ilge-minio-data:
